name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend Lint and Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hebo
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d hebo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hebo
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 7d
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Initialize database schema
        run: npm run db:init
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

  frontend:
    name: Frontend Lint Build Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        run: npm run test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hebo
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d hebo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hebo
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 7d
      E2E_BACKEND_URL: http://127.0.0.1:4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Initialize database schema
        run: npm run db:init
        working-directory: backend

      - name: Start backend
        run: npm run start &
        working-directory: backend

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4000/health && exit 0
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
